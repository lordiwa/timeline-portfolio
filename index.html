<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: pre-condicion para que env(safe-area-inset-bottom)
         produzca valores no-cero en iPhone con notch / Dynamic Island.
         StickyTimeline (Plan 05) usa env(safe-area-inset-bottom, 0) para
         prevenir overlap con la Safari toolbar dinamica. Sin viewport-fit=cover,
         env() retorna 0 en iOS y la mitigacion no funcionaria. Phase 1 §iOS-01. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>mato-new-portfolio</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        color: #e7e7f0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        min-height: 100vh;
        /* Guard global: evita que el overscan de las capas parallax (inset:-8%;
           width:116%) expanda el layout viewport en mobile y recorte el contenido
           a los lados. El scroller real es .scroll-shell, no el body, así que esto
           no afecta scroll-snap ni el position:sticky de ch3. Ver PLAN-mobile-overflow-fix. */
        overflow-x: hidden;
        max-width: 100%;
      }
      img, canvas {
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
